name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Package for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            backend_lib: libbackend.so
            onnx_lib: libonnxruntime.so
            onnx_url: https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-linux-x64-1.20.1.tgz
            target: x86_64-unknown-linux-gnu
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux
            ytdlp_bin: yt-dlp
            asset_name: youtube-stemmer-linux.tar.gz
          - os: macos-latest
            platform: macos
            backend_lib: libbackend.dylib
            onnx_lib: libonnxruntime.dylib
            onnx_url: https://github.com/microsoft/onnxruntime/releases/download/v1.19.2/onnxruntime-osx-universal2-1.19.2.tgz
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
            ytdlp_bin: yt-dlp
            asset_name: youtube-stemmer-macos.zip
          - os: windows-latest
            platform: windows
            backend_lib: backend.dll
            onnx_lib: onnxruntime.dll
            onnx_url: https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-win-x64-1.20.1.zip
            target: x86_64-pc-windows-msvc
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
            ytdlp_bin: yt-dlp.exe
            asset_name: youtube-stemmer-windows.zip

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libblkid-dev liblzma-dev libnm-dev libsecret-1-dev libssl-dev

      - name: Build and Package
        shell: bash
        run: |
          make build
          python3 scripts/package.py --platform ${{ matrix.platform == 'macos' && 'Darwin' || (matrix.platform == 'windows' && 'Windows' || 'Linux') }} --release --output-name youtube-stemmer-${{ matrix.platform }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.platform }}-build
          path: dist/${{ matrix.platform == 'macos' && 'darwin' || (matrix.platform == 'windows' && 'windows' || 'linux') }}/youtube-stemmer-${{ matrix.platform }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract Release Notes
        id: extract_notes
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          # Extract the full header line for the version
          HEADER_LINE=$(grep "^## \[$TAG_VERSION\]" CHANGELOG.md | head -n 1)
          # Extract the title part (after the first " - ")
          RELEASE_TITLE=$(echo "$HEADER_LINE" | sed -n 's/^## \[[^]]*\] - //p')
          
          if [ -z "$RELEASE_TITLE" ]; then
            RELEASE_TITLE="Release $TAG_VERSION"
          fi

          # Use awk to extract the section for the specific tag
          NOTES=$(awk "/^## \[$TAG_VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          
          if [ -z "$NOTES" ]; then
            NOTES="Initial release of YouTube Stemmer."
          fi
          
          # Handle multi-line output for GITHUB_OUTPUT
          echo "title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Linux Artifact
        uses: actions/download-artifact@v6
        with:
          name: linux-build

      - name: Download macOS Artifact
        uses: actions/download-artifact@v6
        with:
          name: macos-build

      - name: Download Windows Artifact
        uses: actions/download-artifact@v6
        with:
          name: windows-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.extract_notes.outputs.title }}
          body: ${{ steps.extract_notes.outputs.notes }}
          files: |
            dist/linux/youtube-stemmer-linux.tar.gz
            dist/darwin/youtube-stemmer-macos.zip
            dist/windows/youtube-stemmer-windows.zip
          generate_release_notes: false
          draft: false
          prerelease: false
