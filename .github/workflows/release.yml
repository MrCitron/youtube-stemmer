name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Package for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            backend_lib: libbackend.so
            onnx_lib: libonnxruntime.so
            onnx_url: https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-linux-x64-1.20.1.tgz
            target: x86_64-unknown-linux-gnu
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux
            ytdlp_bin: yt-dlp
            asset_name: youtube-stemmer-linux.tar.gz
          - os: macos-latest
            platform: macos
            backend_lib: libbackend.dylib
            onnx_lib: libonnxruntime.dylib
            onnx_url: https://github.com/microsoft/onnxruntime/releases/download/v1.19.2/onnxruntime-osx-universal2-1.19.2.tgz
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
            ytdlp_bin: yt-dlp
            asset_name: youtube-stemmer-macos.zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libblkid-dev liblzma-dev libnm-dev libsecret-1-dev libssl-dev

      - name: Build Rust Backend
        shell: bash
        run: |
          cd backend
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            export MACOSX_DEPLOYMENT_TARGET=11.0
            cargo build --release --target aarch64-apple-darwin
            cargo build --release --target x86_64-apple-darwin
            lipo -create -output ${{ matrix.backend_lib }} \
              target/aarch64-apple-darwin/release/libbackend.dylib \
              target/x86_64-apple-darwin/release/libbackend.dylib
          else
            cargo build --release
            cp target/release/libbackend.so .
          fi

      - name: Download ONNX Runtime
        shell: bash
        run: |
          mkdir -p onnx_temp
          curl -Lf ${{ matrix.onnx_url }} -o onnx_archive
          tar -xzf onnx_archive -C onnx_temp
          find onnx_temp -name "${{ matrix.onnx_lib }}" -exec cp {} . \;
          mv ${{ matrix.onnx_lib }} backend/

      - name: Download yt-dlp
        shell: bash
        run: |
          curl -Lf ${{ matrix.ytdlp_url }} -o ${{ matrix.ytdlp_bin }}
          chmod +x ${{ matrix.ytdlp_bin }}
          mv ${{ matrix.ytdlp_bin }} backend/

      - name: Prepare Frontend
        run: |
          cp backend/${{ matrix.backend_lib }} frontend/${{ matrix.platform }}/
          cp backend/${{ matrix.onnx_lib }} frontend/${{ matrix.platform }}/
          cp backend/yt-dlp frontend/${{ matrix.platform }}/

      - name: Build Flutter App
        run: |
          cd frontend
          flutter pub get
          flutter build ${{ matrix.platform }} --release

      - name: Package Artifacts (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd frontend/build/linux/x64/release/bundle
          cp $GITHUB_WORKSPACE/backend/${{ matrix.backend_lib }} .
          cp $GITHUB_WORKSPACE/backend/${{ matrix.onnx_lib }} .
          cp $GITHUB_WORKSPACE/backend/yt-dlp .
          tar -czf $GITHUB_WORKSPACE/${{ matrix.asset_name }} .

      - name: Package Artifacts (MacOS)
        if: matrix.platform == 'macos'
        run: |
          cd frontend/build/macos/Build/Products/Release/
          cp $GITHUB_WORKSPACE/backend/yt-dlp "youtube_stemmer.app/Contents/MacOS/"
          zip -r $GITHUB_WORKSPACE/${{ matrix.asset_name }} "youtube_stemmer.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Release Notes
        id: extract_notes
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          # Use awk to extract the section for the specific tag
          # It finds the line starting with ## [ and containing the TAG_VERSION, 
          # then prints until the next ## [
          NOTES=$(awk "/^## \[$TAG_VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          
          if [ -z "$NOTES" ]; then
            NOTES="Initial release of YouTube Stemmer."
          fi
          
          # Handle multi-line output for GITHUB_OUTPUT
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.extract_notes.outputs.notes }}
          files: |
            youtube-stemmer-linux.tar.gz
            youtube-stemmer-macos.zip
          generate_release_notes: false
          draft: false
          prerelease: false
