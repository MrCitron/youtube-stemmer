name: Build & Package Desktop

on:
  push:
    branches: [ main, 'fix/**', 'feat/**' ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
      - 'scripts/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            backend_lib: libbackend.so
            onnx_lib: libonnxruntime.so
            onnx_url: https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-linux-x64-1.20.1.tgz
            target: x86_64-unknown-linux-gnu
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux
            ytdlp_bin: yt-dlp
          - os: macos-latest
            platform: macos
            backend_lib: libbackend.dylib
            onnx_lib: libonnxruntime.dylib
            onnx_url: https://github.com/microsoft/onnxruntime/releases/download/v1.19.2/onnxruntime-osx-universal2-1.19.2.tgz
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
            ytdlp_bin: yt-dlp
          - os: windows-latest
            platform: windows
            backend_lib: backend.dll
            onnx_lib: onnxruntime.dll
            onnx_url: https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-win-x64-1.20.1.zip
            target: x86_64-pc-windows-msvc
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
            ytdlp_bin: yt-dlp.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libblkid-dev liblzma-dev libnm-dev libsecret-1-dev libssl-dev

      - name: Build Rust Backend
        shell: bash
        run: |
          cd backend
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            export MACOSX_DEPLOYMENT_TARGET=11.0
            # Build for ARM64
            cargo build --release --target aarch64-apple-darwin
            # Build for AMD64
            cargo build --release --target x86_64-apple-darwin
            # Create Universal Binary
            lipo -create -output ${{ matrix.backend_lib }} \
              target/aarch64-apple-darwin/release/libbackend.dylib \
              target/x86_64-apple-darwin/release/libbackend.dylib
          else
            cargo build --release
            # Windows output is backend.dll, Linux is libbackend.so
            if [[ "${{ matrix.platform }}" == "windows" ]]; then
              cp target/release/backend.dll .
            else
              cp target/release/libbackend.so .
            fi
          fi

      - name: Download ONNX Runtime
        shell: bash
        run: |
          mkdir -p onnx_temp
          curl -Lf ${{ matrix.onnx_url }} -o onnx_archive
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            unzip onnx_archive -d onnx_temp
            find onnx_temp -name "${{ matrix.onnx_lib }}" -exec cp {} . \;
          else
            tar -xzf onnx_archive -C onnx_temp
            find onnx_temp -name "${{ matrix.onnx_lib }}" -exec cp {} . \;
          fi
          mv ${{ matrix.onnx_lib }} backend/

      - name: Download yt-dlp
        shell: bash
        run: |
          curl -Lf ${{ matrix.ytdlp_url }} -o ${{ matrix.ytdlp_bin }}
          chmod +x ${{ matrix.ytdlp_bin }}
          mv ${{ matrix.ytdlp_bin }} backend/

      - name: Prepare Frontend (MacOS)
        if: matrix.platform == 'macos'
        run: |
          cp backend/${{ matrix.backend_lib }} frontend/macos/
          cp backend/${{ matrix.onnx_lib }} frontend/macos/
          cp backend/yt-dlp frontend/macos/

      - name: Prepare Frontend (Windows)
        if: matrix.platform == 'windows'
        run: |
          cp backend/${{ matrix.backend_lib }} frontend/windows/
          cp backend/${{ matrix.onnx_lib }} frontend/windows/
          cp backend/yt-dlp.exe frontend/windows/

      - name: Prepare Frontend (Linux)
        if: matrix.platform == 'linux'
        run: |
          cp backend/${{ matrix.backend_lib }} frontend/linux/
          cp backend/${{ matrix.onnx_lib }} frontend/linux/
          cp backend/yt-dlp frontend/linux/

      - name: Build Flutter App
        run: |
          cd frontend
          flutter pub get
          flutter build ${{ matrix.platform }} --release

      - name: Package Artifacts (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd frontend/build/linux/x64/release/bundle
          cp $GITHUB_WORKSPACE/backend/${{ matrix.backend_lib }} .
          cp $GITHUB_WORKSPACE/backend/${{ matrix.onnx_lib }} .
          cp $GITHUB_WORKSPACE/backend/yt-dlp .
          tar -czf $GITHUB_WORKSPACE/youtube-stemmer-linux.tar.gz .

      - name: Package Artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd frontend/build/windows/x64/runner/Release
          Copy-Item $env:GITHUB_WORKSPACE/backend/${{ matrix.backend_lib }} .
          Copy-Item $env:GITHUB_WORKSPACE/backend/${{ matrix.onnx_lib }} .
          Copy-Item $env:GITHUB_WORKSPACE/backend/yt-dlp.exe .
          Compress-Archive -Path * -DestinationPath $env:GITHUB_WORKSPACE/youtube-stemmer-windows.zip

      - name: Package Artifacts (MacOS)
        if: matrix.platform == 'macos'
        run: |
          cd frontend/build/macos/Build/Products/Release/
          cp $GITHUB_WORKSPACE/backend/yt-dlp "youtube_stemmer.app/Contents/MacOS/"
          zip -r $GITHUB_WORKSPACE/youtube-stemmer-macos.zip "youtube_stemmer.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-stemmer-${{ matrix.platform }}
          path: youtube-stemmer-${{ matrix.platform }}.*
