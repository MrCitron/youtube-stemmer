name: Build & Package Desktop

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
      - 'scripts/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build.yml'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            backend_lib: libbackend.so
            onnx_lib: libonnxruntime.so
            onnx_url: https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-linux-x64-1.20.1.tgz
            target: x86_64-unknown-linux-gnu
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux
            ytdlp_bin: yt-dlp
          - os: macos-latest
            platform: macos
            backend_lib: libbackend.dylib
            onnx_lib: libonnxruntime.dylib
            onnx_url: https://github.com/microsoft/onnxruntime/releases/download/v1.19.2/onnxruntime-osx-universal2-1.19.2.tgz
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
            ytdlp_bin: yt-dlp
          - os: windows-latest
            platform: windows
            backend_lib: backend.dll
            onnx_lib: onnxruntime.dll
            onnx_url: https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-win-x64-1.20.1.zip
            target: x86_64-pc-windows-msvc
            ytdlp_url: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
            ytdlp_bin: yt-dlp.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'x86_64-apple-darwin,aarch64-apple-darwin' || matrix.target }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libblkid-dev liblzma-dev libnm-dev libsecret-1-dev libssl-dev

      - name: Build and Package
        shell: bash
        run: |
          make build
          python3 scripts/package.py --platform ${{ matrix.platform == 'macos' && 'Darwin' || (matrix.platform == 'windows' && 'Windows' || 'Linux') }} --output-name youtube-stemmer-${{ matrix.platform }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-stemmer-${{ matrix.platform }}
          path: dist/${{ matrix.platform == 'macos' && 'darwin' || matrix.platform }}/youtube-stemmer-${{ matrix.platform }}.*
