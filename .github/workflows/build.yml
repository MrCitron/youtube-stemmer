name: Build & Package Desktop

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'conductor/**'
      - '**.md'
      - '.gitignore'
      - 'README_MAC.md'
      - 'BUILD.md'
      - 'Makefile'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'conductor/**'
      - '**.md'
      - '.gitignore'
      - 'README_MAC.md'
      - 'BUILD.md'
      - 'Makefile'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      any_changed: ${{ steps.set-matrix.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            linux:
              - 'backend/**'
              - 'frontend/lib/**'
              - 'frontend/linux/**'
              - 'frontend/pubspec.yaml'
              - '.github/workflows/build.yml'
              - 'scripts/**'
            macos:
              - 'backend/**'
              - 'frontend/lib/**'
              - 'frontend/macos/**'
              - 'frontend/pubspec.yaml'
              - '.github/workflows/build.yml'
              - 'scripts/**'
            windows:
              - 'backend/**'
              - 'frontend/lib/**'
              - 'frontend/windows/**'
              - 'frontend/pubspec.yaml'
              - '.github/workflows/build.yml'
              - 'scripts/**'

      - id: set-matrix
        run: |
          MATRIX='{"include":[]}'
          ANY_CHANGED="false"
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ steps.filter.outputs.linux }}" == "true" ]]; then
            MATRIX=$(echo $MATRIX | jq -c '.include += [{"os":"ubuntu-latest","platform":"linux","backend_lib":"libbackend.so","onnx_lib":"libonnxruntime.so","onnx_url":"https://github.com/microsoft/onnxruntime/releases/download/v1.17.1/onnxruntime-linux-x64-1.17.1.tgz"}]')
            ANY_CHANGED="true"
          fi
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ steps.filter.outputs.macos }}" == "true" ]]; then
            MATRIX=$(echo $MATRIX | jq -c '.include += [{"os":"macos-latest","platform":"macos","backend_lib":"libbackend.dylib","onnx_lib":"libonnxruntime.dylib","onnx_url":"https://github.com/microsoft/onnxruntime/releases/download/v1.17.1/onnxruntime-osx-universal2-1.17.1.tgz"}]')
            ANY_CHANGED="true"
          fi
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ steps.filter.outputs.windows }}" == "true" ]]; then
            MATRIX=$(echo $MATRIX | jq -c '.include += [{"os":"windows-latest","platform":"windows","backend_lib":"libbackend.dll","onnx_lib":"onnxruntime.dll","onnx_url":"https://github.com/microsoft/onnxruntime/releases/download/v1.17.1/onnxruntime-win-x64-1.17.1.zip"}]')
            ANY_CHANGED="true"
          fi
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "any_changed=$ANY_CHANGED" >> $GITHUB_OUTPUT

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libblkid-dev liblzma-dev libnm-dev libsecret-1-dev

      - name: Build Go Backend (Shared Library)
        shell: bash
        run: |
          cd backend
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            export MACOSX_DEPLOYMENT_TARGET=11.0
            export CGO_CFLAGS="-mmacosx-version-min=11.0"
            export CGO_LDFLAGS="-mmacosx-version-min=11.0"
            # Build for ARM64
            GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build -buildmode=c-shared -o libbackend_arm64.dylib main.go
            # Build for AMD64 (Intel)
            GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 go build -buildmode=c-shared -o libbackend_amd64.dylib main.go
            # Create Universal Binary
            lipo -create -output ${{ matrix.backend_lib }} libbackend_arm64.dylib libbackend_amd64.dylib
          else
            go build -buildmode=c-shared -o ${{ matrix.backend_lib }} main.go
          fi

      - name: Download ONNX Runtime
        shell: bash
        run: |
          mkdir -p onnx_temp
          curl -Lf ${{ matrix.onnx_url }} -o onnx_archive
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            unzip onnx_archive -d onnx_temp
            find onnx_temp -name "${{ matrix.onnx_lib }}" -exec cp {} . \;
          else
            tar -xzf onnx_archive -C onnx_temp
            find onnx_temp -name "${{ matrix.onnx_lib }}" -exec cp {} . \;
          fi
          mv ${{ matrix.onnx_lib }} backend/

      - name: Prepare Frontend (MacOS)
        if: matrix.platform == 'macos'
        run: |
          cp backend/${{ matrix.backend_lib }} frontend/macos/
          cp backend/${{ matrix.onnx_lib }} frontend/macos/

      - name: Prepare Frontend (Windows)
        if: matrix.platform == 'windows'
        run: |
          cp backend/${{ matrix.backend_lib }} frontend/windows/
          cp backend/${{ matrix.onnx_lib }} frontend/windows/

      - name: Prepare Frontend (Linux)
        if: matrix.platform == 'linux'
        run: |
          cp backend/${{ matrix.backend_lib }} frontend/linux/
          cp backend/${{ matrix.onnx_lib }} frontend/linux/

      - name: Build Flutter App
        run: |
          cd frontend
          flutter pub get
          flutter build ${{ matrix.platform }} --release

      - name: Package Artifacts (Linux)
        if: matrix.platform == 'linux'
        run: |
          cd frontend/build/linux/x64/release/bundle
          cp $GITHUB_WORKSPACE/backend/${{ matrix.backend_lib }} .
          cp $GITHUB_WORKSPACE/backend/${{ matrix.onnx_lib }} .
          tar -czf $GITHUB_WORKSPACE/youtube-stemmer-linux.tar.gz .

      - name: Package Artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd frontend/build/windows/x64/runner/Release
          Copy-Item $env:GITHUB_WORKSPACE/backend/${{ matrix.backend_lib }} .
          Copy-Item $env:GITHUB_WORKSPACE/backend/${{ matrix.onnx_lib }} .
          Compress-Archive -Path * -DestinationPath $env:GITHUB_WORKSPACE/youtube-stemmer-windows.zip

      - name: Package Artifacts (MacOS)
        if: matrix.platform == 'macos'
        run: |
          cd frontend/build/macos/Build/Products/Release/
          zip -r $GITHUB_WORKSPACE/youtube-stemmer-macos.zip "youtube_stemmer.app"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-stemmer-${{ matrix.platform }}
          path: youtube-stemmer-${{ matrix.platform }}.*
