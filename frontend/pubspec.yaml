name: youtube_stemmer
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  ffi: ^2.1.2
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  just_audio: ^0.10.5
  just_audio_media_kit: ^2.1.0
  media_kit_libs_linux: ^1.2.1
  file_picker: ^8.1.0
  file_selector: ^1.1.0
  dio: ^5.4.0
  sqflite: ^2.4.2
  path: ^1.9.1
  sqflite_common_ffi: ^2.4.0+2
  sqlite3_flutter_libs: ^0.5.0
  window_manager: ^0.5.1

dependency_overrides:
  sqlite3: 3.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21 # android min sdk min:21, default 21
  web:
    generate: true
    image_path: "assets/icon.png"
    backgroundColor: "#191022"
    themeColor: "#7F0DF2"
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48 # min:48, default:48
  macos:
    generate: true
    image_path: "assets/icon.png"
  linux:
    generate: true
    image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/click.wav
    - assets/click_down.wav
    - assets/icon.png
