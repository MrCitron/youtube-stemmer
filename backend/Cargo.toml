[package]
name = "backend"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
libc = "0.2"
ort = "2.0.0-rc.9" # ONNX Runtime wrapper
symphonia = { version = "0.5", features = ["aac", "isomp4", "wav", "mp3", "pcm"] }
hound = "3.5" # WAV writing
zip = "2.2"
once_cell = "1.19"
anyhow = "1.0"
tokio = { version = "1.36", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ureq = { version = "2.9", features = ["json", "native-certs"] }
